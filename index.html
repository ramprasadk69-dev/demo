<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping - Deal Portal</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
    .home-card {
      background: rgb(44, 43, 43);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      padding: 40px 34px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .logo-box {
      width: 90px; height: 90px;
      background: linear-gradient(135deg, #1a237e, #3949ab);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(26,35,126,0.25);
    }
    .logo-box span { color: white; font-weight: 800; font-size: 13px; letter-spacing: 1px; line-height: 1.2; }
    .site-title { font-size: 18px; font-weight: 700; color: #1a237e; }
    .site-tagline { font-size: 12px; color: #aaa; margin-bottom: 28px; }

    .nav-stack { display: flex; flex-direction: column; gap: 11px; margin-bottom: 24px; }
    .nav-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none;
      font-family: inherit; transition: all 0.2s; text-align: left;
    }
    .nav-btn .btn-icon { font-size: 20px; width: 28px; flex-shrink: 0; }
    .nav-btn .btn-arrow { margin-left: auto; font-size: 16px; opacity: 0.6; }
    .nav-btn-primary { background: linear-gradient(135deg,#1a237e,#3949ab); color: white; box-shadow: 0 4px 14px rgba(26,35,126,0.22); }
    .nav-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,35,126,0.32); }
    .nav-btn-outline { background: #efe93f; color: #1a237e; border: 2px solid #efe93f; }
    .nav-btn-outline:hover { transform: translateY(-2px); }
    .nav-btn-green { background: linear-gradient(135deg,#1b5e20,#388e3c); color: white; box-shadow: 0 4px 14px rgba(27,94,32,0.18); }
    .nav-btn-green:hover { transform: translateY(-2px); }
    .nav-btn-orange { background: linear-gradient(135deg,#e65100,#f57c00); color: white; box-shadow: 0 4px 14px rgba(230,81,0,0.18); }
    .nav-btn-orange:hover { transform: translateY(-2px); }

    .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #bbb; margin-bottom: 14px; font-weight: 600; }

    .login-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 8px; }
    .login-tile {
      background: #fafafa; border: 1.5px solid #e0e0e0; border-radius: 12px;
      padding: 16px 10px; text-align: center; cursor: pointer; transition: all 0.2s;
      text-decoration: none; display: block; color: #333;
    }
    .login-tile:hover { background: #e8eaf6; border-color: #3949ab; transform: translateY(-2px); }
    .login-tile .tile-icon { font-size: 26px; display: block; margin-bottom: 7px; }
    .login-tile .tile-label { font-size: 12px; font-weight: 600; color: #555; }

    .social-row { display: flex; justify-content: center; gap: 13px; margin-top: 10px; }
    .social-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .social-btn:hover { transform: scale(1.15); box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
    .sw { background: #25D366; color: white; }
    .st { background: #0088cc; color: white; }
    .si { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color: white; }

    footer { text-align: center; padding: 18px; font-size: 12px; color: #ccc; }
  </style>
</head>
<body>
  <main>
    <div class="home-card">
      <div class="logo-box"><span>SHOPPING<br>DEALS</span></div>
      <div class="site-title"></div>
      <div class="site-tagline">Trusted Deal Portal • Est. 2022</div>

  <!--    <div class="section-label">Quick Login</div>
      <div class="login-grid">
        <a href="buyer-login.html" class="login-tile">
          <span class="tile-icon">🔐</span>
          <span class="tile-label">Biometric / FaceID</span>
        </a>
        <a href="buyer-login.html" class="login-tile">
          <span class="tile-icon">👤</span>
          <span class="tile-label">Buyer Login</span>
        </a>
      </div>  -->

  <!--    <div class="divider"></div> -->

      <div class="nav-stack">
        <a href="order-form.html" class="nav-btn nav-btn-primary">
          <span class="btn-icon">📋</span> Order Form
          <span class="btn-arrow">›</span>
        </a>
        <a href="refund-form.html" class="nav-btn nav-btn-outline">
          <span class="btn-icon">↩️</span> Refund Form
          <span class="btn-arrow">›</span>
        </a>
        <a href="track-order.html" class="nav-btn nav-btn-green">
          <span class="btn-icon">🔍</span> Track Your Order Status
          <span class="btn-arrow">›</span>
        </a>
        <a href="active-deals.html" class="nav-btn nav-btn-orange">
          <span class="btn-icon">🤝</span> Active Deals
          <span class="btn-arrow">›</span>
        </a>
      </div>

      <div class="divider"></div>

      <div class="login-grid">
        <a href="buyer-login.html" class="login-tile">
          <span class="tile-icon">🛒</span>
          <span class="tile-label">Buyer Login</span>
        </a>
        <a href="mediator-login.html" class="login-tile">
          <span class="tile-icon">🤝</span>
          <span class="tile-label">Mediator Login</span>
        </a>
      </div>

      <div class="divider"></div>

      <div class="section-label">Connect With Us</div>
      <div class="social-row">
        <a href="#" class="social-btn sw" title="WhatsApp">💬</a>
        <a href="#" class="social-btn st" title="Telegram">✈️</a>
        <a href="#" class="social-btn si" title="Instagram">📷</a>
      </div>
    </div>
  </main>
  <footer>© 2026 Jayshakthi Marketing</footer>
</body>
</html>
