<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mediator Login - Shopping</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-card { max-width: 400px; }
    .forgot { text-align: right; margin-bottom: 20px; }
    .forgot a { font-size: 12px; color: #388e3c; text-decoration: none; }
    .forgot a:hover { text-decoration: underline; }
    .info-box {
      background: #f9f9f9; border: 1.5px solid #e0e0e0; border-radius: 12px;
      padding: 14px 16px; font-size: 12px; color: #777; margin-top: 16px; text-align: center; line-height: 1.7;
    }
    .info-box strong { color: #333; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-logo">Deals</div>
      <div>
        <div class="navbar-title">Shopping Deals</div>
        <div class="navbar-subtitle">Deal Portal</div>
      </div>
    </a>
    <a href="index.html" class="navbar-back">← Back</a>
  </nav>

  <div class="page-wrapper">
    <div class="card login-card">
      <div class="page-title">🤝 Mediator Login</div>
       <div class="divider"></div>
      <div class="page-subtitle">Access your mediator dashboard and manage deals</div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Mediator ID / Phone</label>
          <input type="text" placeholder="Your mediator ID or registered phone" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required/>
        </div>
        <div class="forgot"><a href="#">Forgot Password?</a></div>
        <button type="submit" class="btn btn-green btn-block">Login as Mediator →</button>
      </form>

      <div class="info-box">
        <strong>Not a mediator yet?</strong><br/>
        For mediator registration, please contact us via<br/>
        📱 WhatsApp &nbsp;|&nbsp; ✈️ Telegram &nbsp;|&nbsp; 📧 Email
      </div>
    </div>
  </div>

  <div class="page-footer">© 2026 Jayshakthi Marketing</div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      window.location.href = 'mediator-portal.html';
    }
  </script>
</body>
</html>
